version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: devcard
      POSTGRES_PASSWORD: devcard
      POSTGRES_DB: devcard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devcard -d devcard"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: always
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://devcard:devcard@db:5432/devcard?schema=public
      - REDIS_URL=redis://redis:6379
      - PORT=3001
      - HOST=0.0.0.0
      - NODE_ENV=production
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: always
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=5173
      - ORIGIN=${PUBLIC_APP_URL:-http://localhost:5173}
      - PUBLIC_APP_URL=${PUBLIC_APP_URL:-http://localhost:5173}
      - BACKEND_URL=http://backend:3001
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
